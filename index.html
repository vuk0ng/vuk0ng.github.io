<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Quentin Farrokhian</title>
  <style>
    :root {
      --bg-1: #cfe8ff;
      --bg-2: #b9ddff;
      --bg-3: #d7d0ff;
      --bg-4: #ffd6e8;
      --bg-5: #ffe2b8;
      --bg-6: #c7f2e6;
      --text: #182230;
      --muted: #4f6074;
      --line: rgba(66, 92, 128, 0.2);
      --white: rgba(255, 255, 255, 0.74);
      --white-strong: rgba(255, 255, 255, 0.9);
      --shadow: 0 20px 48px rgba(73, 99, 145, 0.2);
      --accent-a: #4ea8ff;
      --accent-b: #45d6a8;
      --accent-c: #ffbf47;
      --accent-d: #ff7faa;
      --accent-e: #8d7dff;
      --accent-f: #5b8cff;
      --accent-g: #ff9f6e;
      --accent-h: #63d5ff;
      --center-size: clamp(220px, 24vw, 310px);
      --bubble-size: clamp(100px, 10vw, 142px);
      --bubble-open-w: min(420px, calc(100vw - 32px));
      --bubble-open-h: min(520px, calc(100vh - 32px));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 15%, rgba(99, 213, 255, 0.42), transparent 24%),
        radial-gradient(circle at 85% 18%, rgba(141, 125, 255, 0.32), transparent 26%),
        radial-gradient(circle at 82% 82%, rgba(255, 127, 170, 0.28), transparent 28%),
        radial-gradient(circle at 18% 82%, rgba(69, 214, 168, 0.26), transparent 24%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 20%, var(--bg-3) 44%, var(--bg-4) 68%, var(--bg-5) 84%, var(--bg-6) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vw;
      height: 38vw;
      border-radius: 50%;
      filter: blur(78px);
      pointer-events: none;
      opacity: 0.48;
      z-index: 0;
      animation: drift 16s ease-in-out infinite alternate;
    }

    body::before {
      top: -9vw;
      left: -7vw;
      background: radial-gradient(circle, rgba(78, 168, 255, 0.48), rgba(99, 213, 255, 0.22), transparent 68%);
    }

    body::after {
      right: -10vw;
      bottom: -10vw;
      background: radial-gradient(circle, rgba(255, 127, 170, 0.42), rgba(255, 191, 71, 0.2), transparent 68%);
      animation-duration: 18s;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(20px, -18px, 0) scale(1.08); }
    }

    #portfolio {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.15) 0 0.5px, transparent 0.6px),
        radial-gradient(circle at 70% 60%, rgba(0,0,0,0.1) 0 0.5px, transparent 0.6px);
      background-size: 18px 18px, 24px 24px;
      z-index: 0;
    }

    .network-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.92;
    }

    #bubble-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .center-card {
      position: absolute;
      inset: 50% auto auto 50%;
      width: var(--center-size);
      min-height: var(--center-size);
      transform: translate(-50%, -50%);
      border-radius: 34px;
      background: linear-gradient(160deg, rgba(255,255,255,0.82), rgba(238,245,255,0.58));
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 26px 60px rgba(62, 85, 123, 0.22);
      backdrop-filter: blur(18px) saturate(130%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px;
      z-index: 4;
      text-align: center;
    }

    .photo-wrap {
      width: clamp(92px, 9vw, 122px);
      height: clamp(92px, 9vw, 122px);
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-e), var(--accent-d), var(--accent-c));
      box-shadow: 0 16px 34px rgba(86, 110, 152, 0.26);
    }

    .photo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(217,234,255,0.9));
      display: grid;
      place-items: center;
      color: #4d5f75;
      font-weight: 800;
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      letter-spacing: 0.08em;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .center-card h1 {
      margin: 2px 0 0;
      font-size: clamp(1.3rem, 2vw, 2rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: #122033;
    }

    .center-card .role {
      margin: 0;
      font-size: clamp(0.92rem, 1.2vw, 1rem);
      color: var(--muted);
      max-width: 24ch;
      line-height: 1.4;
    }

    .badge-row,
    .quick-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge,
    .quick-link {
      border-radius: 999px;
      padding: 9px 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.78), rgba(230,239,255,0.58));
      border: 1px solid rgba(255,255,255,0.44);
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      box-shadow: 0 10px 22px rgba(83, 108, 147, 0.14);
      backdrop-filter: blur(10px);
    }

    .badge:hover,
    .quick-link:hover {
      transform: translateY(-2px);
      border-color: rgba(78, 168, 255, 0.58);
      box-shadow: 0 12px 24px rgba(83, 108, 147, 0.18);
      background: linear-gradient(135deg, rgba(255,255,255,0.86), rgba(238,245,255,0.72));
    }

    .bubble {
      position: absolute;
      width: var(--bubble-size);
      height: var(--bubble-size);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.55);
      background: linear-gradient(160deg, rgba(255,255,255,0.74), rgba(233,242,255,0.44));
      backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px;
      cursor: pointer;
      transition:
        width 0.45s cubic-bezier(.2,.9,.2,1),
        height 0.45s cubic-bezier(.2,.9,.2,1),
        transform 0.3s ease,
        box-shadow 0.3s ease,
        border-radius 0.35s ease,
        left 0.45s cubic-bezier(.2,.9,.2,1),
        top 0.45s cubic-bezier(.2,.9,.2,1),
        background 0.25s ease;
      user-select: none;
      overflow: hidden;
      z-index: 2;
    }

    .bubble::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 48%);
      pointer-events: none;
    }

    .bubble:hover {
      transform: scale(1.08);
      box-shadow: 0 24px 44px rgba(73, 99, 145, 0.24);
    }

    .bubble.active {
      width: var(--bubble-open-w);
      height: var(--bubble-open-h);
      border-radius: 30px;
      padding: 22px;
      justify-content: flex-start;
      align-items: flex-start;
      text-align: left;
      cursor: default;
      z-index: 20;
      transform: none;
      background: linear-gradient(160deg, rgba(255,255,255,0.92), rgba(233,242,255,0.76));
      border-color: rgba(255,255,255,0.62);
      box-shadow: 0 34px 82px rgba(58, 84, 126, 0.28);
    }

    .bubble-shell {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubble.active .bubble-shell {
      display: block;
      overflow: hidden;
    }

    .bubble-mini {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }

    .bubble-icon {
      font-size: 1.55rem;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
    }

    .bubble-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.15;
    }

    .bubble-sub {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.2;
      max-width: 14ch;
    }

    .bubble-content {
      display: none;
      opacity: 0;
      height: 100%;
      width: 100%;
      transition: opacity 0.22s ease;
    }

    .bubble.active .bubble-mini {
      display: none;
    }

    .bubble.active .bubble-content {
      display: flex;
      flex-direction: column;
      opacity: 1;
      min-height: 0;
    }

    .bubble-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .bubble-top h2 {
      margin: 0 0 6px;
      font-size: clamp(1.15rem, 1.5vw, 1.4rem);
      color: #162235;
    }

    .bubble-top p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.93rem;
    }

    .close-btn {
      border: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(227,236,255,0.62));
      border: 1px solid rgba(255,255,255,0.5);
      width: 38px;
      height: 38px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.25rem;
      color: #4b5970;
      flex: 0 0 auto;
      transition: transform 0.2s ease, background 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .close-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, rgba(255,255,255,0.94), rgba(236,243,255,0.78));
    }

    .scroll-area {
      min-height: 0;
      overflow: auto;
      padding-right: 6px;
      display: grid;
      gap: 12px;
      scrollbar-width: thin;
    }

    .scroll-area::-webkit-scrollbar {
      width: 8px;
    }

    .scroll-area::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(78, 168, 255, 0.48), rgba(141, 125, 255, 0.48));
      border-radius: 999px;
    }

    .content-card {
      border-radius: 18px;
      background: linear-gradient(155deg, rgba(255,255,255,0.78), rgba(230,239,255,0.52));
      border: 1px solid rgba(255,255,255,0.48);
      padding: 14px;
      box-shadow: 0 12px 28px rgba(73, 99, 145, 0.12);
      backdrop-filter: blur(10px);
    }

    .content-card h3 {
      margin: 0 0 8px;
      font-size: 0.97rem;
      color: #162235;
    }

    .content-card p,
    .content-card li {
      margin: 0;
      color: #2d3d52;
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .content-card ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      background: linear-gradient(135deg, rgba(255,255,255,0.86), rgba(231,240,255,0.68));
      border: 1px solid rgba(255,255,255,0.54);
      box-shadow: 0 8px 18px rgba(73, 99, 145, 0.08);
      backdrop-filter: blur(8px);
    }

    .accent-a {
      background: linear-gradient(160deg, rgba(78, 168, 255, 0.5), rgba(255,255,255,0.42));
      box-shadow: 0 18px 45px rgba(78, 168, 255, 0.28);
    }
    .accent-b {
      background: linear-gradient(160deg, rgba(69, 214, 168, 0.46), rgba(255,255,255,0.42));
      box-shadow: 0 18px 45px rgba(69, 214, 168, 0.24);
    }
    .accent-c {
      background: linear-gradient(160deg, rgba(255, 191, 71, 0.48), rgba(255,255,255,0.42));
      box-shadow: 0 18px 45px rgba(255, 191, 71, 0.24);
    }
    .accent-d {
      background: linear-gradient(160deg, rgba(255, 127, 170, 0.46), rgba(255,255,255,0.42));
      box-shadow: 0 18px 45px rgba(255, 127, 170, 0.24);
    }
    .accent-e {
      background: linear-gradient(160deg, rgba(141, 125, 255, 0.46), rgba(255,255,255,0.42));
      box-shadow: 0 18px 45px rgba(141, 125, 255, 0.24);
    }
    .accent-f {
      background: linear-gradient(160deg, rgba(91, 140, 255, 0.46), rgba(255,255,255,0.42));
      box-shadow: 0 18px 45px rgba(91, 140, 255, 0.24);
    }

    .bubble[data-accent="a"] { outline: 2px solid rgba(78, 168, 255, 0.25); }
    .bubble[data-accent="b"] { outline: 2px solid rgba(69, 214, 168, 0.25); }
    .bubble[data-accent="c"] { outline: 2px solid rgba(255, 191, 71, 0.25); }
    .bubble[data-accent="d"] { outline: 2px solid rgba(255, 127, 170, 0.25); }
    .bubble[data-accent="e"] { outline: 2px solid rgba(141, 125, 255, 0.25); }
    .bubble[data-accent="f"] { outline: 2px solid rgba(91, 140, 255, 0.25); }

    .legend {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 5;
      padding: 10px 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(228,239,255,0.5));
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.44);
      box-shadow: 0 10px 24px rgba(73, 99, 145, 0.14);
      color: var(--muted);
      font-size: 0.78rem;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(132, 176, 255, 0.18), rgba(255, 144, 183, 0.14));
      backdrop-filter: blur(6px) saturate(115%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 10;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 980px) {
      :root {
        --center-size: 220px;
        --bubble-size: 96px;
      }

      .bubble-title { font-size: 0.86rem; }
      .bubble-sub { display: none; }
      .legend { display: none; }
    }

    @media (max-width: 720px) {
      .center-card {
        top: 50%;
        left: 50%;
        width: min(92vw, 290px);
        min-height: auto;
        padding: 16px;
      }

      .center-card .quick-links,
      .center-card .badge-row {
        gap: 6px;
      }

      .badge,
      .quick-link {
        padding: 8px 10px;
        font-size: 0.75rem;
      }

      .bubble.active {
        width: calc(100vw - 20px);
        height: min(74vh, 620px);
        left: 10px !important;
        top: 13vh !important;
      }
    }
  </style>
</head>

    const bubbleLayer = document.getElementById('bubble-layer');
    const overlay = document.getElementById('overlay');
    const linesSvg = document.getElementById('lines');
    let activeBubble = null;

    function createBubble(item) {
      const bubble = document.createElement('button');
      bubble.className = 'bubble accent-' + item.accent;
      bubble.dataset.id = item.id;
      bubble.dataset.accent = item.accent;
      bubble.type = 'button';
      bubble.setAttribute('aria-label', item.title);

      bubble.innerHTML = `
        <div class="bubble-shell">
          <div class="bubble-mini">
            <div class="bubble-icon">${item.icon}</div>
            <h3 class="bubble-title">${item.title}</h3>
            <div class="bubble-sub">${item.mini}</div>
          </div>

          <div class="bubble-content">
            <div class="bubble-top">
              <div>
                <h2>${item.icon} ${item.title}</h2>
                <p>${item.intro}</p>
              </div>
              <button class="close-btn" type="button" aria-label="Fermer">×</button>
            </div>
            <div class="scroll-area"></div>
          </div>
        </div>
      `;

      const scrollArea = bubble.querySelector('.scroll-area');
      item.blocks.forEach(block => scrollArea.appendChild(renderBlock(block)));

      bubble.addEventListener('click', (e) => {
        if (e.target.closest('.close-btn')) return;
        if (bubble.classList.contains('active')) return;
        openBubble(bubble);
      });

      bubble.querySelector('.close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        closeBubble();
      });

      bubbleLayer.appendChild(bubble);
      return bubble;
    }

    function renderBlock(block) {
      const card = document.createElement('section');
      card.className = 'content-card';

      const title = document.createElement('h3');
      title.textContent = block.title;
      card.appendChild(title);

      if (block.type === 'text') {
        const p = document.createElement('p');
        p.textContent = block.content;
        card.appendChild(p);
      }

      if (block.type === 'list') {
        const ul = document.createElement('ul');
        block.items.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          ul.appendChild(li);
        });
        card.appendChild(ul);
      }

      if (block.type === 'chips') {
        const wrap = document.createElement('div');
        wrap.className = 'chips';
        block.items.forEach(item => {
          const span = document.createElement('span');
          span.className = 'chip';
          span.textContent = item;
          wrap.appendChild(span);
        });
        card.appendChild(wrap);
      }

      if (block.type === 'links') {
        const wrap = document.createElement('div');
        wrap.className = 'chips';
        block.items.forEach(item => {
          const a = document.createElement('a');
          a.className = 'chip';
          a.textContent = item.label;
          a.href = item.href;
          a.target = '_blank';
          a.rel = 'noreferrer';
          a.style.textDecoration = 'none';
          a.style.color = 'inherit';
          wrap.appendChild(a);
        });
        card.appendChild(wrap);
      }

      return card;
    }

    function getCenterRect() {
      const center = document.getElementById('centerCard').getBoundingClientRect();
      return {
        x: center.left + center.width / 2,
        y: center.top + center.height / 2,
        width: center.width,
        height: center.height
      };
    }

    function layoutBubbles() {
      const bubbles = [...document.querySelectorAll('.bubble')];
      const center = getCenterRect();
      const w = window.innerWidth;
      const h = window.innerHeight;
      const leftCount = Math.ceil(bubbles.length / 2);
      const rightCount = bubbles.length - leftCount;

      const leftYs = distribute(leftCount, 90, h - 90);
      const rightYs = distribute(rightCount, 90, h - 90);

      const leftXs = [w * 0.12, w * 0.23, w * 0.16, w * 0.26, w * 0.11];
      const rightXs = [w * 0.88, w * 0.77, w * 0.84, w * 0.74, w * 0.89];

      bubbles.forEach((bubble, index) => {
        const side = index < leftCount ? 'left' : 'right';
        const sideIndex = side === 'left' ? index : index - leftCount;
        const x = side === 'left' ? leftXs[sideIndex % leftXs.length] : rightXs[sideIndex % rightXs.length];
        const y = side === 'left' ? leftYs[sideIndex] : rightYs[sideIndex];

        bubble.dataset.homeLeft = `${x - bubble.offsetWidth / 2}`;
        bubble.dataset.homeTop = `${y - bubble.offsetHeight / 2}`;

        if (!bubble.classList.contains('active')) {
          bubble.style.left = `${x - bubble.offsetWidth / 2}px`;
          bubble.style.top = `${y - bubble.offsetHeight / 2}px`;
        }
      });

      drawLines(center, bubbles);
    }

    function distribute(count, min, max) {
      if (count <= 1) return [(min + max) / 2];
      const arr = [];
      const step = (max - min) / (count - 1);
      for (let i = 0; i < count; i++) arr.push(min + step * i);
      return arr;
    }

    function drawLines(center, bubbles) {
      linesSvg.setAttribute('width', window.innerWidth);
      linesSvg.setAttribute('height', window.innerHeight);
      linesSvg.innerHTML = '';

      bubbles.forEach(bubble => {
        const bx = parseFloat(bubble.style.left) + bubble.offsetWidth / 2;
        const by = parseFloat(bubble.style.top) + bubble.offsetHeight / 2;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', center.x);
        line.setAttribute('y1', center.y);
        line.setAttribute('x2', bx);
        line.setAttribute('y2', by);
        line.setAttribute('stroke', 'rgba(124, 198, 255, 0.30)');
        line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('stroke-dasharray', '4 8');
        linesSvg.appendChild(line);
      });
    }

    function openBubble(bubble) {
      if (activeBubble && activeBubble !== bubble) {
        closeBubble(false);
      }

      activeBubble = bubble;
      bubble.classList.add('active');
      overlay.classList.add('visible');

      const targetLeft = (window.innerWidth - bubble.offsetWidth) / 2;
      const targetTop = (window.innerHeight - bubble.offsetHeight) / 2;
      bubble.style.left = `${Math.max(10, targetLeft)}px`;
      bubble.style.top = `${Math.max(10, targetTop)}px`;
    }

    function closeBubble(redraw = true) {
      if (!activeBubble) return;
      activeBubble.classList.remove('active');
      activeBubble.style.left = `${activeBubble.dataset.homeLeft}px`;
      activeBubble.style.top = `${activeBubble.dataset.homeTop}px`;
      activeBubble = null;
      overlay.classList.remove('visible');
      if (redraw) requestAnimationFrame(layoutBubbles);
    }

    overlay.addEventListener('click', closeBubble);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeBubble();
    });

    bubbleData.forEach(createBubble);
    window.addEventListener('resize', () => {
      if (activeBubble) {
        closeBubble(false);
      }
      layoutBubbles();
    });

    requestAnimationFrame(layoutBubbles);
  </script>
