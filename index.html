<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-1: #0f1726;
      --bg-2: #152238;
      --bg-3: #1e2f4b;
      --bg-4: #2c2347;
      --bg-5: #4a2740;
      --bg-6: #5d3a2e;
      --text: #f7f1ea;
      --muted: #d8c9bd;
      --line: rgba(255, 214, 166, 0.28);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      --accent-a: #58d6ff;
      --accent-b: #37e0a9;
      --accent-c: #ffbc57;
      --accent-d: #ff7ca8;
      --accent-e: #9c84ff;
      --accent-f: #ff9966;
      --center-size: clamp(240px, 24vw, 320px);
      --bubble-size: clamp(124px, 12vw, 168px);
      --bubble-open-w: min(460px, calc(100vw - 32px));
      --bubble-open-h: min(540px, calc(100vh - 32px));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(88, 214, 255, 0.22), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(156, 132, 255, 0.20), transparent 28%),
        radial-gradient(circle at 78% 78%, rgba(255, 124, 168, 0.18), transparent 30%),
        radial-gradient(circle at 18% 84%, rgba(255, 188, 87, 0.16), transparent 26%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 22%, var(--bg-3) 42%, var(--bg-4) 64%, var(--bg-5) 82%, var(--bg-6) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 42vw;
      height: 42vw;
      border-radius: 50%;
      filter: blur(88px);
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
      animation: drift 16s ease-in-out infinite alternate;
    }

    body::before {
      top: -12vw;
      left: -10vw;
      background: radial-gradient(circle, rgba(88, 214, 255, 0.34), rgba(55, 224, 169, 0.14), transparent 68%);
    }

    body::after {
      right: -12vw;
      bottom: -12vw;
      background: radial-gradient(circle, rgba(255, 153, 102, 0.30), rgba(255, 124, 168, 0.14), transparent 68%);
      animation-duration: 18s;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(18px, -18px, 0) scale(1.08); }
    }

    #portfolio {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.1;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.16) 0 0.5px, transparent 0.6px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.1) 0 0.5px, transparent 0.6px);
      background-size: 18px 18px, 24px 24px;
      z-index: 0;
    }

    .network-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.96;
    }

    #bubble-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
    }

    .center-card {
      position: absolute;
      inset: 50% auto auto 50%;
      width: var(--center-size);
      height: var(--center-size);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
      border: 2px solid rgba(255,255,255,0.18);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.36), 0 0 0 16px rgba(255,255,255,0.03);
      backdrop-filter: blur(18px) saturate(145%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 6;
      text-align: center;
    }

    .photo-wrap {
      width: clamp(150px, 15vw, 210px);
      height: clamp(150px, 15vw, 210px);
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-e), var(--accent-d), var(--accent-c), var(--accent-f));
      box-shadow: 0 20px 42px rgba(0, 0, 0, 0.34), 0 0 30px rgba(88, 214, 255, 0.18);
      display: block;
    }

    .photo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), rgba(18, 28, 46, 0.88));
      display: grid;
      place-items: center;
      color: #fff3e8;
      font-weight: 800;
      font-size: clamp(2rem, 3vw, 2.7rem);
      letter-spacing: 0.08em;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .quick-links,
    .badge-row,
    .center-card h1,
    .center-card .role {
      display: none !important;
    }

    .bubble {
      position: absolute;
      width: var(--bubble-size);
      height: var(--bubble-size);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(165deg, rgba(255,255,255,0.20), rgba(255,255,255,0.08));
      backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      cursor: pointer;
      transition:
        width 0.45s cubic-bezier(.2,.9,.2,1),
        height 0.45s cubic-bezier(.2,.9,.2,1),
        transform 0.3s ease,
        box-shadow 0.3s ease,
        border-radius 0.35s ease,
        left 0.45s cubic-bezier(.2,.9,.2,1),
        top 0.45s cubic-bezier(.2,.9,.2,1),
        background 0.25s ease;
      user-select: none;
      overflow: hidden;
      z-index: 2;
    }

    .bubble::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.24), transparent 46%);
      pointer-events: none;
    }

    .bubble:hover {
      transform: scale(1.1);
      box-shadow: 0 28px 52px rgba(0, 0, 0, 0.34);
    }

    .bubble.active {
      width: var(--bubble-open-w);
      height: var(--bubble-open-h);
      border-radius: 32px;
      padding: 22px;
      justify-content: flex-start;
      align-items: flex-start;
      text-align: left;
      cursor: default;
      z-index: 20;
      transform: none;
      background: linear-gradient(160deg, rgba(27, 38, 59, 0.92), rgba(49, 34, 67, 0.9));
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 40px 90px rgba(0, 0, 0, 0.42);
    }

    .bubble-shell {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubble.active .bubble-shell {
      display: block;
      overflow: hidden;
    }

    .bubble-mini {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }

    .bubble-icon {
      font-size: 1.9rem;
      line-height: 1;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.24));
    }

    .bubble-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      line-height: 1.15;
      color: #fff6ee;
    }

    .bubble-sub {
      font-size: 0.76rem;
      color: #eedfcf;
      line-height: 1.2;
      max-width: 14ch;
    }

    .bubble-content {
      display: none;
      opacity: 0;
      height: 100%;
      width: 100%;
      transition: opacity 0.22s ease;
    }

    .bubble.active .bubble-mini {
      display: none;
    }

    .bubble.active .bubble-content {
      display: flex;
      flex-direction: column;
      opacity: 1;
      min-height: 0;
    }

    .bubble-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .bubble-top h2 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 1.5vw, 1.45rem);
      color: #fff6ee;
    }

    .bubble-top p {
      margin: 0;
      color: #d9cabd;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .close-btn {
      border: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.14);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.25rem;
      color: #fff0df;
      flex: 0 0 auto;
      transition: transform 0.2s ease, background 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .close-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0.12));
    }

    .scroll-area {
      min-height: 0;
      overflow: auto;
      padding-right: 6px;
      display: grid;
      gap: 12px;
      scrollbar-width: thin;
    }

    .scroll-area::-webkit-scrollbar {
      width: 8px;
    }

    .scroll-area::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(88, 214, 255, 0.54), rgba(255, 124, 168, 0.54));
      border-radius: 999px;
    }

    .content-card {
      border-radius: 20px;
      background: linear-gradient(155deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.12);
      padding: 15px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    .content-card h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #fff5ea;
    }

    .content-card p,
    .content-card li {
      margin: 0;
      color: #eadfd4;
      line-height: 1.5;
      font-size: 0.94rem;
    }

    .content-card ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      color: #fff3e7;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(8px);
    }

    .accent-a { background: linear-gradient(160deg, rgba(88, 214, 255, 0.32), rgba(255,255,255,0.08)); box-shadow: 0 18px 45px rgba(88, 214, 255, 0.18); }
    .accent-b { background: linear-gradient(160deg, rgba(55, 224, 169, 0.28), rgba(255,255,255,0.08)); box-shadow: 0 18px 45px rgba(55, 224, 169, 0.18); }
    .accent-c { background: linear-gradient(160deg, rgba(255, 188, 87, 0.30), rgba(255,255,255,0.08)); box-shadow: 0 18px 45px rgba(255, 188, 87, 0.18); }
    .accent-d { background: linear-gradient(160deg, rgba(255, 124, 168, 0.30), rgba(255,255,255,0.08)); box-shadow: 0 18px 45px rgba(255, 124, 168, 0.18); }
    .accent-e { background: linear-gradient(160deg, rgba(156, 132, 255, 0.30), rgba(255,255,255,0.08)); box-shadow: 0 18px 45px rgba(156, 132, 255, 0.18); }
    .accent-f { background: linear-gradient(160deg, rgba(255, 153, 102, 0.30), rgba(255,255,255,0.08)); box-shadow: 0 18px 45px rgba(255, 153, 102, 0.18); }

    .bubble[data-accent="a"] { outline: 2px solid rgba(88, 214, 255, 0.18); }
    .bubble[data-accent="b"] { outline: 2px solid rgba(55, 224, 169, 0.18); }
    .bubble[data-accent="c"] { outline: 2px solid rgba(255, 188, 87, 0.18); }
    .bubble[data-accent="d"] { outline: 2px solid rgba(255, 124, 168, 0.18); }
    .bubble[data-accent="e"] { outline: 2px solid rgba(156, 132, 255, 0.18); }
    .bubble[data-accent="f"] { outline: 2px solid rgba(255, 153, 102, 0.18); }

    .legend {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 13;
      padding: 11px 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      color: #ecdccc;
      font-size: 0.8rem;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88, 214, 255, 0.10), rgba(255, 124, 168, 0.08));
      backdrop-filter: blur(6px) saturate(115%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 8;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 980px) {
      :root {
        --center-size: 220px;
        --bubble-size: 110px;
      }

      .bubble-title { font-size: 0.92rem; }
      .bubble-sub { display: none; }
      .legend { display: none; }
    }

    @media (max-width: 720px) {
      .center-card {
        width: min(72vw, 260px);
        height: min(72vw, 260px);
      }

      .photo-wrap {
        width: min(54vw, 180px);
        height: min(54vw, 180px);
      }

      .bubble.active {
        width: calc(100vw - 20px);
        height: min(74vh, 620px);
        left: 10px !important;
        top: 13vh !important;
      }
    }
  </style>
</head>

              { label: 'Voir mon GitHub', href: 'https://github.com/vuk0ng' },
              { label: 'Voir mon LinkedIn', href: 'https://www.linkedin.com/in/quentin-farrokhian-68b31a2b1/' }
            ]
          },
          {
            title: 'Coordonnées',
            type: 'chips',
            items: ['qfarrokhpro@gmail.com', '+33 7 68 58 27 71', 'Toulon / Marseille / Annecy']
          }
        ]
      }
    ];

    const bubbleLayer = document.getElementById('bubble-layer');
    const overlay = document.getElementById('overlay');
    const linesSvg = document.getElementById('lines');
    let activeBubble = null;

    function createBubble(item) {
      const bubble = document.createElement('button');
      bubble.className = 'bubble accent-' + item.accent;
      bubble.dataset.id = item.id;
      bubble.dataset.accent = item.accent;
      bubble.type = 'button';
      bubble.setAttribute('aria-label', item.title);

      bubble.innerHTML = `
        <div class="bubble-shell">
          <div class="bubble-mini">
            <div class="bubble-icon">${item.icon}</div>
            <h3 class="bubble-title">${item.title}</h3>
            <div class="bubble-sub">${item.mini}</div>
          </div>

          <div class="bubble-content">
            <div class="bubble-top">
              <div>
                <h2>${item.icon} ${item.title}</h2>
                <p>${item.intro}</p>
              </div>
              <button class="close-btn" type="button" aria-label="Fermer">×</button>
            </div>
            <div class="scroll-area"></div>
          </div>
        </div>
      `;

      const scrollArea = bubble.querySelector('.scroll-area');
      item.blocks.forEach(block => scrollArea.appendChild(renderBlock(block)));

      bubble.addEventListener('click', (e) => {
        if (e.target.closest('.close-btn')) return;
        if (bubble.classList.contains('active')) return;
        openBubble(bubble);
      });

      bubble.querySelector('.close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        closeBubble();
      });

      bubbleLayer.appendChild(bubble);
      return bubble;
    }

    function renderBlock(block) {
      const card = document.createElement('section');
      card.className = 'content-card';

      const title = document.createElement('h3');
      title.textContent = block.title;
      card.appendChild(title);

      if (block.type === 'text') {
        const p = document.createElement('p');
        p.textContent = block.content;
        card.appendChild(p);
      }

      if (block.type === 'list') {
        const ul = document.createElement('ul');
        block.items.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          ul.appendChild(li);
        });
        card.appendChild(ul);
      }

      if (block.type === 'chips') {
        const wrap = document.createElement('div');
        wrap.className = 'chips';
        block.items.forEach(item => {
          const span = document.createElement('span');
          span.className = 'chip';
          span.textContent = item;
          wrap.appendChild(span);
        });
        card.appendChild(wrap);
      }

      if (block.type === 'links') {
        const wrap = document.createElement('div');
        wrap.className = 'chips';
        block.items.forEach(item => {
          const a = document.createElement('a');
          a.className = 'chip';
          a.textContent = item.label;
          a.href = item.href;
          a.target = '_blank';
          a.rel = 'noreferrer';
          a.style.textDecoration = 'none';
          a.style.color = 'inherit';
          wrap.appendChild(a);
        });
        card.appendChild(wrap);
      }

      return card;
    }

    function getCenterRect() {
      const center = document.getElementById('centerCard').getBoundingClientRect();
      return {
        x: center.left + center.width / 2,
        y: center.top + center.height / 2,
        width: center.width,
        height: center.height
      };
    }

    function layoutBubbles() {
      const bubbles = [...document.querySelectorAll('.bubble')];
      const center = getCenterRect();
      const w = window.innerWidth;
      const h = window.innerHeight;
      const leftCount = Math.ceil(bubbles.length / 2);
      const rightCount = bubbles.length - leftCount;

      const leftYs = distribute(leftCount, 120, h - 120);
      const rightYs = distribute(rightCount, 120, h - 120);

      const leftXs = [w * 0.14, w * 0.24, w * 0.16, w * 0.26, w * 0.13];
      const rightXs = [w * 0.86, w * 0.76, w * 0.84, w * 0.74, w * 0.87];

      bubbles.forEach((bubble, index) => {
        const side = index < leftCount ? 'left' : 'right';
        const sideIndex = side === 'left' ? index : index - leftCount;
        const x = side === 'left' ? leftXs[sideIndex % leftXs.length] : rightXs[sideIndex % rightXs.length];
        const y = side === 'left' ? leftYs[sideIndex] : rightYs[sideIndex];

        bubble.dataset.homeLeft = `${Math.round(x - bubble.offsetWidth / 2)}`;
        bubble.dataset.homeTop = `${Math.round(y - bubble.offsetHeight / 2)}`;

        if (!bubble.classList.contains('active')) {
          bubble.style.left = `${Math.round(x - bubble.offsetWidth / 2)}px`;
          bubble.style.top = `${Math.round(y - bubble.offsetHeight / 2)}px`;
        }
      });

      drawLines(center, bubbles);
    }

    function distribute(count, min, max) {
      if (count <= 1) return [(min + max) / 2];
      const arr = [];
      const step = (max - min) / (count - 1);
      for (let i = 0; i < count; i++) arr.push(min + step * i);
      return arr;
    }

    function drawLines(center, bubbles) {
      linesSvg.setAttribute('width', window.innerWidth);
      linesSvg.setAttribute('height', window.innerHeight);
      linesSvg.innerHTML = '';

      bubbles.forEach((bubble, i) => {
        const bx = parseFloat(bubble.style.left) + bubble.offsetWidth / 2;
        const by = parseFloat(bubble.style.top) + bubble.offsetHeight / 2;
        const dx = bx - center.x;
        const dy = by - center.y;
        const distance = Math.hypot(dx, dy) || 1;
        const startOffset = document.getElementById('centerCard').offsetWidth / 2 + 10;
        const endOffset = bubble.offsetWidth / 2 + 8;
        const x1 = center.x + (dx / distance) * startOffset;
        const y1 = center.y + (dy / distance) * startOffset;
        const x2 = bx - (dx / distance) * endOffset;
        const y2 = by - (dy / distance) * endOffset;

        const curve = 0.08;
        const c1x = x1 + dx * curve;
        const c1y = y1 + dy * 0.18;
        const c2x = x2 - dx * curve;
        const c2y = y2 - dy * 0.18;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const d = `M ${x1} ${y1} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x2} ${y2}`;
        path.setAttribute('d', d);
        path.setAttribute('id', `path-${i}`);
        path.setAttribute('stroke', 'rgba(255, 214, 166, 0.30)');
        path.setAttribute('stroke-width', '1.8');
        path.setAttribute('stroke-dasharray', '6 10');
        path.setAttribute('fill', 'none');
        linesSvg.appendChild(path);

        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        glow.setAttribute('d', d);
        glow.setAttribute('stroke', 'rgba(88, 214, 255, 0.16)');
        glow.setAttribute('stroke-width', '4');
        glow.setAttribute('fill', 'none');
        glow.setAttribute('stroke-linecap', 'round');
        linesSvg.appendChild(glow);

        const packet = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        packet.setAttribute('r', '4');
        packet.setAttribute('fill', i % 2 === 0 ? 'rgba(88,214,255,0.95)' : 'rgba(255,188,87,0.95)');

        const motion = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
        motion.setAttribute('dur', `${2.6 + Math.random() * 2.2}s`);
        motion.setAttribute('repeatCount', 'indefinite');

        const mpath = document.createElementNS('http://www.w3.org/2000/svg', 'mpath');
        mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'href', `#path-${i}`);
        motion.appendChild(mpath);
        packet.appendChild(motion);
        linesSvg.appendChild(packet);
      });
    }

    function openBubble(bubble) {
      if (activeBubble && activeBubble !== bubble) {
        closeBubble(false);
      }

      activeBubble = bubble;
      bubble.classList.add('active');
      overlay.classList.add('visible');

      const targetLeft = (window.innerWidth - bubble.offsetWidth) / 2;
      const targetTop = (window.innerHeight - bubble.offsetHeight) / 2;
      bubble.style.left = `${Math.max(10, targetLeft)}px`;
      bubble.style.top = `${Math.max(10, targetTop)}px`;
    }

    function closeBubble(redraw = true) {
      if (!activeBubble) return;
      activeBubble.classList.remove('active');
      activeBubble.style.left = `${activeBubble.dataset.homeLeft}px`;
      activeBubble.style.top = `${activeBubble.dataset.homeTop}px`;
      activeBubble = null;
      overlay.classList.remove('visible');
      if (redraw) requestAnimationFrame(layoutBubbles);
    }

    overlay.addEventListener('click', closeBubble);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeBubble();
    });

    bubbleData.forEach(createBubble);
    window.addEventListener('resize', () => {
      if (activeBubble) {
        closeBubble(false);
      }
      layoutBubbles();
    });

    requestAnimationFrame(layoutBubbles);
  </script>
</body>
